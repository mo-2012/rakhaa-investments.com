<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة القانونية - رخاء للاستثمار | Rakhaa Investments</title>

    <!-- Google Fonts - Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ألوان موقع رخاء للاستثمار الأصلية */
            --primary: #0c2d5e;
            --primary-light: #1a4a8f;
            --secondary: #c9a96e;
            --secondary-dark: #a8864e;
            --accent: #00d4ff;
            --dark: #071426;
            --light: #f8f9fa;
            --gray: #6c757d;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --fast-transition: all 0.3s ease;

            /* ألوان إضافية للتصميم */
            --white: #ffffff;
            --text-dark: #1a1a2e;
            --text-medium: #4a4a5a;
            --text-light: #8a8a9a;
            --border-light: rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 15px 40px rgba(0, 0, 0, 0.15);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light);
            color: var(--text-dark);
            line-height: 1.8;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== BACKGROUND PARTICLES / GRADIENT ==================== */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(12, 45, 94, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 90%, rgba(0, 212, 255, 0.02) 0%, transparent 50%);
        }

        /* ==================== TOP BAR ==================== */
        .top-bar {
            background: var(--dark);
            padding: 8px 0;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .top-bar-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .top-bar a {
            color: var(--secondary);
            text-decoration: none;
            transition: var(--fast-transition);
        }
        .top-bar a:hover {
            color: var(--accent);
        }
        .top-bar .contact-row {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        .top-bar .social-row {
            display: flex;
            gap: 10px;
        }

        /* ==================== HEADER ==================== */
        .header {
            background: linear-gradient(180deg, rgba(12, 45, 94, 0.97) 0%, rgba(7, 20, 38, 0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--dark);
            font-weight: 900;
            box-shadow: 0 0 25px rgba(201, 169, 110, 0.3);
        }
        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        .logo-text span {
            font-size: 0.65rem;
            color: var(--secondary);
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .lang-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 9px 18px;
            border-radius: 25px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: var(--fast-transition);
            font-family: 'Cairo', sans-serif;
            font-weight: 500;
        }
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .badge-pill {
            background: rgba(201, 169, 110, 0.15);
            border: 1px solid rgba(201, 169, 110, 0.3);
            color: var(--secondary);
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ==================== NAVIGATION ==================== */
        .nav-bar {
            background: var(--white);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 78px;
            z-index: 999;
            box-shadow: var(--shadow-sm);
        }
        .nav-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            gap: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-link {
            padding: 16px 18px;
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 500;
            font-size: 0.88rem;
            white-space: nowrap;
            transition: var(--fast-transition);
            border-bottom: 3px solid transparent;
            position: relative;
        }
        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
            border-bottom-color: var(--secondary);
            font-weight: 700;
        }
        .nav-link.active {
            color: var(--dark);
            background: rgba(201, 169, 110, 0.06);
        }

        /* ==================== HERO ==================== */
        .hero {
            background: linear-gradient(160deg, var(--dark) 0%, #0a1e3d 30%, var(--primary) 60%, #0f3460 100%);
            padding: 55px 20px 65px;
            text-align: center;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -15%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 750px;
            margin: 0 auto;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 18px;
        }
        .hero h2 {
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            line-height: 1.4;
            background: linear-gradient(135deg, var(--white) 0%, #d0d8e8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero .gold-line {
            width: 70px;
            height: 3px;
            background: var(--secondary);
            margin: 18px auto;
            border-radius: 4px;
        }
        .hero p {
            font-size: 1.05rem;
            color: #a0b0c8;
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* ==================== MAIN CONTAINER ==================== */
        .container {
            max-width: 1280px;
            margin: -30px auto 50px;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }

        /* ==================== STATS ==================== */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--white);
            padding: 22px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            text-align: center;
            min-width: 130px;
            border: 1px solid var(--border-light);
            transition: var(--fast-transition);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--secondary);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: 500;
        }

        /* ==================== SECTION HEADER ==================== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--secondary);
        }
        .section-header .s-icon {
            font-size: 2rem;
        }
        .section-header h3 {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.2px;
        }

        /* ==================== DOCUMENT GRID ==================== */
        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .doc-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            transition: var(--fast-transition);
            border: 1px solid var(--border-light);
            flex-wrap: wrap;
            cursor: default;
        }
        .doc-card:hover {
            border-color: var(--secondary);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .doc-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 240px;
        }
        .doc-icon-box {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.1), rgba(201, 169, 110, 0.05));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            color: var(--secondary);
            border: 1px solid rgba(201, 169, 110, 0.2);
        }
        .doc-info h4 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .doc-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-light);
            align-items: center;
        }
        .doc-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .lang-tag {
            padding: 3px 12px;
            border-radius: 14px;
            font-size: 0.73rem;
            font-weight: 700;
        }
        .lang-tag.ar {
            background: #e8f5e9;
            color: #1b5e20;
        }
        .lang-tag.en {
            background: #e3f2fd;
            color: #0d47a1;
        }

        /* ==================== DOWNLOAD BUTTON ==================== */
        .btn-dl {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: var(--white);
            padding: 13px 26px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--fast-transition);
            white-space: nowrap;
            border: 2px solid transparent;
            letter-spacing: 0.3px;
        }
        .btn-dl:hover {
            background: var(--secondary);
            color: var(--dark);
            border-color: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 110, 0.35);
        }
        .btn-dl .dl-icon {
            font-size: 1.2rem;
        }

        /* ==================== FOOTER ==================== */
        .footer {
            background: linear-gradient(0deg, var(--dark) 0%, var(--primary) 100%);
            color: #a0b0c0;
            text-align: center;
            padding: 35px 20px 30px;
            font-size: 0.85rem;
            margin-top: 60px;
            border-top: 1px solid var(--glass-border);
        }
        .footer .gold-name {
            color: var(--secondary);
            font-weight: 700;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .footer-links a {
            color: #b0c0d0;
            text-decoration: none;
            transition: var(--fast-transition);
            font-size: 0.84rem;
            font-weight: 500;
        }
        .footer-links a:hover {
            color: var(--accent);
        }
        .footer-disclaimer {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #7080a0;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .header-inner {
                padding: 12px 16px;
                flex-direction: column;
                text-align: center;
            }
            .hero {
                padding: 35px 16px 45px;
            }
            .hero h2 {
                font-size: 1.6rem;
            }
            .nav-inner {
                padding: 0 10px;
            }
            .nav-link {
                padding: 12px 14px;
                font-size: 0.8rem;
            }
            .doc-card {
                padding: 16px;
                gap: 12px;
                flex-direction: column;
            }
            .doc-left {
                flex-direction: column;
                text-align: center;
            }
            .doc-meta {
                justify-content: center;
            }
            .btn-dl {
                width: 100%;
                justify-content: center;
            }
            .stats-row {
                gap: 10px;
            }
            .stat-card {
                min-width: 80px;
                padding: 14px 12px;
            }
            .stat-number {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .hero h2 {
                font-size: 1.3rem;
            }
            .logo-text h1 {
                font-size: 1.2rem;
            }
            .section-header h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
